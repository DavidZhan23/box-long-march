# 推送到 main 时构建并部署到 GitHub Pages
# 使用前请在仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」
name: Deploy to GitHub Pages

# 避免 actions 在 Node 20 上运行产生弃用告警（2026 起默认 Node 24）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
  # 在 Actions 页可手动「Run workflow」触发，便于排查
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install & build
        env:
          # 与仓库名一致，站点为 https://<用户>.github.io/<仓库名>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
